<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EletroTech Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 35%),
                        linear-gradient(135deg, #0f172a 0%, #111827 60%);
            color: #e2e8f0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .login-card {
            width: min(420px, calc(100% - 32px));
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(71, 85, 105, 0.55);
            border-radius: 20px;
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.35);
            padding: 36px;
        }
        .brand-mark {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            color: white;
            font-size: 28px;
        }
        .login-card h2 {
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
        }
        .form-control {
            background-color: #0f172a;
            color: #f8fafc;
            border-color: #334155;
            border-radius: 14px;
            height: 52px;
        }
        .form-control::placeholder {
            color: rgba(226, 232, 240, 0.65);
        }
        .form-control:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 0.15rem rgba(34, 197, 94, 0.25);
        }
        .form-label,
        .help-text,
        .login-card h2,
        .brand-mark {
            color: #f8fafc;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #38bdf8);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .help-text {
            color: #94a3b8;
            text-align: center;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-mark"><i class="fas fa-bolt"></i></div>
        <h2>Entrar no EletroTech</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        <p class="help-text">Informe usuário e senha para acessar o painel administrativo com segurança.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
